name: Add Masjid from Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL of the timetable file (JPG/PNG/PDF)'
        required: true
      name:
        description: 'Masjid name override (leave blank to auto-detect from image)'
        required: false

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y poppler-utils
          pip install anthropic pdf2image Pillow

      - name: Download timetable file
        run: |
          # Preserve original extension for PDF detection
          URL="${{ github.event.inputs.image_url }}"
          EXT="${URL##*.}"
          EXT="${EXT,,}"
          case "$EXT" in
            pdf) OUT="/tmp/timetable.pdf" ;;
            *) OUT="/tmp/timetable.jpg" ;;
          esac
          curl -L -o "$OUT" "$URL"
          echo "TIMETABLE_PATH=$OUT" >> $GITHUB_ENV

      - name: Extract timetable
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.name }}" ]; then
            python extract_timetable.py add --image "$TIMETABLE_PATH" --name "${{ github.event.inputs.name }}"
          else
            python extract_timetable.py add --image "$TIMETABLE_PATH"
          fi

      - name: Commit new masjid data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "🕌 Add masjid from image" || echo "No changes to commit"
          git push
