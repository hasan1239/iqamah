name: Update Masjid Timetable

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Masjid slug (e.g. faizul, quba, aisha)'
        required: true
      image_url:
        description: 'URL of the new timetable file (JPG/PNG/PDF)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y poppler-utils
          pip install anthropic pdf2image Pillow

      - name: Download timetable file
        run: |
          # Preserve original extension for PDF detection
          URL="${{ github.event.inputs.image_url }}"
          EXT="${URL##*.}"
          EXT="${EXT,,}"
          case "$EXT" in
            pdf) OUT="/tmp/timetable.pdf" ;;
            *) OUT="/tmp/timetable.jpg" ;;
          esac
          curl -L -o "$OUT" "$URL"
          echo "TIMETABLE_PATH=$OUT" >> $GITHUB_ENV

      - name: Update timetable
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python extract_timetable.py update --slug "${{ github.event.inputs.slug }}" --image "$TIMETABLE_PATH"

      - name: Commit updated timetable
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "🔄 Update timetable: ${{ github.event.inputs.slug }}" || echo "No changes to commit"
          git push
